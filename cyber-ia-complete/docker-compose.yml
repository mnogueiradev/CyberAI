version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cyber-ia-backend
    ports:
      - "8000:8000"
    volumes:
      - ./Data:/app/Data
      - ./models:/app/models
      - ./reports:/app/reports
      - ./src:/app/src
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    networks:
      - cyber-ia-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cyber-ia-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cyber-ia-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  cyber-ia-network:
    driver: bridge

volumes:
  cyber-ia-data:
    driver: local
  cyber-ia-models:
    driver: local
  cyber-ia-reports:
    driver: local
