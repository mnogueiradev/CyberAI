version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cyber-ia-backend-dev
    ports:
      - "8000:8000"
    volumes:
      - ./Data:/app/Data
      - ./models:/app/models
      - ./reports:/app/reports
      - ./src:/app/src
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=development
    networks:
      - cyber-ia-network
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "api.server:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: cyber-ia-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - cyber-ia-network
    restart: unless-stopped
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_API_URL=http://localhost:8000

networks:
  cyber-ia-network:
    driver: bridge
